name: Publish to NPM

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build package
        run: npm run build
      
      - name: Build hooks
        run: npm run build:hooks
      
      - name: Run tests
        run: npm test
      
      - name: Verify package contents
        run: |
          echo "Package contents:"
          npm pack --dry-run
      
      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Discussion
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const release = context.payload.release;
            await github.rest.repos.createDiscussionComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              discussion_number: 1, // Update with actual discussion number
              body: `🎉 Released ${release.tag_name}\n\n${release.body}`
            }).catch(() => {
              console.log('Discussion comment skipped');
            });
